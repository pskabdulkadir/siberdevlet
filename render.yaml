services:
  - type: web
    name: gaia-simulation
    env: node
    plan: free
    buildCommand: npm install; npx prisma generate; npx prisma db push --skip-generate; npm run build
    startCommand: node dist/server.cjs
    healthCheckPath: /health
    envVars:
      # ⚠️ Boşta bırakılabilir - Sistem otonom kurulum yapar
      - key: PORT
        value: "3000"
      - key: LIVE_MODE
        value: "true"
      - key: LIVE_EXTERNAL_BUYERS
        value: "false"
      - key: LIVE_MARKETING_READY
        value: "false"
      # v21.0: SQLite Database - Kalıcı depolama
      - key: DATABASE_URL
        value: "file:/var/data/wallet.db"
      # TRON RPC - Stabil ve Resmi
      - key: TRON_RPC_URL
        value: "https://api.trongrid.io/jsonrpc"
      # Polygon USDT - Canlı para transfer
      - key: POLYGON_RPC_URL
        value: "https://polygon-rpc.com"
      - key: OWNER_CRYPTO_ADDRESS
        sync: false
      - key: POLYGON_USDT_CONTRACT
        value: "0xc2132D05D31c914a87C6611C10748AEb04B58e8F"
      - key: OWNER_CRYPTO_PRIVATE_KEY
        sync: false
      # Açık kaynak AI fallback
      # - key: GEMINI_API_KEY
      #   value: ""
    disk:
      - name: wallet_data
        mountPath: /var/data
        sizeGB: 1

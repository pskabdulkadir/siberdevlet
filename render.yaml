services:
  - type: web
    name: gaia-simulation
    env: node
    plan: free
    buildCommand: npm install && npm run build && npx prisma migrate deploy || true
    startCommand: node dist/server.cjs
    healthCheckPath: /health
    envVars:
      # ⚠️ Boşta bırakılabilir - Sistem otonom kurulum yapar
      - key: PORT
        value: "3000"
      # v13.5: SQLite Database - Veriler kalıcı
      - key: DATABASE_URL
        value: "file:./data.db"
      # Polygon USDT - Canlı para transfer
      - key: POLYGON_RPC_URL
        value: "https://rpc.ankr.com/polygon"
      - key: OWNER_CRYPTO_ADDRESS
        value: "0x0f4Bdc545e811060c48B7f16029e5580cB70a680"
      - key: OWNER_CRYPTO_PRIVATE_KEY
        sync: false
      # Açık kaynak AI fallback
      # - key: GEMINI_API_KEY
      #   value: ""
